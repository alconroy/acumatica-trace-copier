<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 240px;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    margin: 0;
    padding: 12px;
  }
  h1 {
    font-size: 13px;
    margin: 0 0 10px;
  }
  button {
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 8px 10px;
    margin-bottom: 8px;
    border: none;
    border-radius: 6px;
    background: #1a73e8;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button.secondary {
    background: #444;
  }
  p {
    font-size: 11px;
    color: #666;
    margin: 8px 0 0;
    line-height: 1.4;
  }
  #status {
    font-size: 11px;
    color: #1a73e8;
    min-height: 14px;
  }
</style>
</head>
<body>
  <h1>Acumatica Trace Copier</h1>
  <button id="copyAll">📋 Copy All Exceptions</button>
  <button id="pick" class="secondary">🎯 Pick Element</button>
  <div id="status"></div>
  <p>On an Acumatica trace page, a floating button also appears automatically. "Pick Element" lets you click any panel (Messages, SQL, a single exception) to copy just that.</p>
</body>
<script src="popup.js"></script>
</html>
